    function renderRoute() {
      const list = orderedItems(filteredItems());
      const grouped = list.reduce((acc, item) => {
        const key = item.category;
        acc[key] ||= [];
        acc[key].push(item);
        return acc;
      }, {});

      if (!list.length) {
        const coverage = regionCoverage(state.region);
        const hasSearch = Boolean(state.search.trim());
        const hasCategory = state.category !== "Все категории";
        const hasStatus = state.status === "open" || state.status === "done";
        const isFilteredEmpty = hasSearch || hasCategory || hasStatus;
        els.route.innerHTML = `
          <div class="empty">
            <strong>${isFilteredEmpty ? "Ничего не найдено" : escapeHtml(coverage.status)}</strong><br>
            ${isFilteredEmpty ? "Попробуй изменить статус, убрать часть запроса или вернуться ко всем категориям." : `${escapeHtml(coverage.note)}<br><br>Если эта локация есть в игре, но ее нет в Notion, нажми <strong>Пополнить из Fandom</strong> или <strong>Добавить предмет</strong>.`}

        </div>
        ${selected.warning ? `
        <div class="detail-section">
          <div class="detail-section-title">Важно</div>
          <div class="important">${escapeHtml(selected.warning)}</div>
        </div>

        ${selectedIssues.length ? fandomChecklist(selected) : ""}
        <div class="actions">
          ${selectedMapLink ? `<a class="link map-link" href="${escapeHtml(selectedMapLink.url)}" target="_blank" rel="noreferrer">MapGenie</a>` : ""}
          <button class="primary" data-toggle="${escapeHtml(selected.id)}">${done ? "Убрать отметку" : "Отметить собранным"}</button>
          <button class="secondary" data-start-edit="${escapeHtml(selected.id)}">Редактировать</button>
          ${state.editMode && state.edits[selected.id] ? `<button class="secondary" data-reset-edit="${escapeHtml(selected.id)}">Сбросить правки</button>` : ""}
          ${state.editMode ? `<button class="secondary" data-delete-item="${escapeHtml(selected.id)}">Удалить предмет</button>` : ""}
        </div>
        <div class="mini-progress">
          <div class="section-title"><span>Прогресс локации</span><strong data-progress-key="detail:${escapeHtml(selectedParentRegion)}" data-progress-value="${regionStats.percent}">${regionStats.percent}%</strong></div>
          <div class="bar" style="--value: ${regionStats.percent}%"><i></i></div>

    function renderStats() {
      const stats = completion(items);
      els.doneCount.textContent = stats.done;
      els.totalCount.textContent = stats.total;
      els.percentCount.dataset.progressKey = "overall";
      els.percentCount.dataset.progressValue = stats.percent;
    }

    function renderEditMode() {
      els.app.classList.toggle("edit-mode", state.editMode);
      els.editModeButton.textContent = state.editMode ? "Режим редактирования: вкл" : "Режим редактирования: выкл";

    function render() {
      const currentRegionList = regionItems(state.region);
      renderControls();
      renderEditMode();
      renderRegions();
      renderHeader(currentRegionList);
      renderSearchState();
      renderStatusState();
      renderFilterMeta();
      renderRoute();
      renderDetail();
      renderStats();
      animateProgressNumbers();
    }

    function animateRouteRender(applyState) {
      els.route.classList.remove("is-fading-in");
      els.route.classList.add("is-fading-out");
      window.setTimeout(() => {
        applyState();
        render();
        els.route.classList.remove("is-fading-out");
        els.route.classList.add("is-fading-in");
        window.setTimeout(() => els.route.classList.remove("is-fading-in"), 160);
      }, 150);
    }

    function animateDetailIn() {
      els.detail.classList.remove("is-sliding");
      void els.detail.offsetWidth;
      els.detail.classList.add("is-sliding");
      window.setTimeout(() => els.detail.classList.remove("is-sliding"), 220);
    }

    function setStepDoneVisual(step, done) {
      if (!step) return;
      step.classList.toggle("done", done);
      const check = step.querySelector(".check");
      if (check) {
        check.setAttribute("aria-label", check.getAttribute("aria-label") || "");
      }
    }

    function toggleCollectedItem(id, trigger) {
      const done = !state.done.has(id);
      done ? state.done.add(id) : state.done.delete(id);
      saveDone();
      playTone(done ? 660 : 330, done ? 0.15 : 0.1, "sine", done ? 0.08 : 0.06);
      animateProgressNumbers(true);
      const step = trigger?.closest(".step");
      if (step) {
        setStepDoneVisual(step, done);
        window.setTimeout(render, 500);
      } else {
        render();
        animateDetailIn();
      }
    }

    let activeItemSwipe = null;
    let suppressItemClickUntil = 0;
    let pendingItemSelectTimer = 0;

    function resetSwipedStep(step) {
      if (!step) return;
      step.classList.remove("swiping", "swipe-complete");
      step.classList.add("snap-back");
      step.style.transform = "translateX(0)";
      window.setTimeout(() => {
        step.classList.remove("snap-back");
        step.style.removeProperty("transform");
      }, 210);
    }

    els.route.addEventListener("touchstart", event => {
      if (!isMobileLayout() || event.touches.length !== 1) return;
      const step = event.target.closest(".step");
      if (!step) return;
      const touch = event.touches[0];
      const itemId = step.querySelector("[data-toggle]")?.dataset.toggle;
      if (!itemId) return;
      activeItemSwipe = {
        step,
        itemId,
        startX: touch.clientX,
        startY: touch.clientY,
        deltaX: 0,
        deltaY: 0,
        horizontal: false
      };
      step.classList.remove("snap-back", "swipe-complete");
      step.style.transition = "none";
    }, { passive: true });

    els.route.addEventListener("touchmove", event => {
      if (!activeItemSwipe || !isMobileLayout() || event.touches.length !== 1) return;
      const touch = event.touches[0];
      activeItemSwipe.deltaX = touch.clientX - activeItemSwipe.startX;
      activeItemSwipe.deltaY = touch.clientY - activeItemSwipe.startY;

      if (activeItemSwipe.deltaX <= 0 || Math.abs(activeItemSwipe.deltaY) >= 30) {
        if (activeItemSwipe.horizontal) resetSwipedStep(activeItemSwipe.step);
        activeItemSwipe.horizontal = false;
        return;
      }

      if (activeItemSwipe.deltaX > Math.abs(activeItemSwipe.deltaY)) {
        activeItemSwipe.horizontal = true;
        event.preventDefault();
        const distance = Math.min(activeItemSwipe.deltaX, 140);
        activeItemSwipe.step.classList.add("swiping");
        activeItemSwipe.step.style.transform = `translateX(${distance}px)`;
      }
    }, { passive: false });

    function finishItemSwipe() {
      if (!activeItemSwipe) return;
      const swipe = activeItemSwipe;
      activeItemSwipe = null;
      const completed = swipe.horizontal && swipe.deltaX > 60 && Math.abs(swipe.deltaY) < 30;

      if (!completed) {
        if (swipe.horizontal && swipe.deltaX > 10) suppressItemClickUntil = Date.now() + 300;
        resetSwipedStep(swipe.step);
        return;
      }

      suppressItemClickUntil = Date.now() + 450;
      swipe.step.classList.remove("swiping");
      swipe.step.classList.add("swipe-complete");
      swipe.step.style.transition = "transform .15s ease";
      swipe.step.style.transform = "translateX(calc(100vw + 80px))";
      window.setTimeout(() => {
        const trigger = swipe.step.querySelector("[data-toggle]");
        toggleCollectedItem(swipe.itemId, trigger);
        swipe.step.style.transition = "none";
        swipe.step.style.transform = "translateX(0)";
        swipe.step.classList.remove("swipe-complete");
      }, 150);
    }

    els.route.addEventListener("touchend", finishItemSwipe, { passive: true });
    els.route.addEventListener("touchcancel", () => {
      if (!activeItemSwipe) return;
      const step = activeItemSwipe.step;
      activeItemSwipe = null;
      resetSwipedStep(step);
    }, { passive: true });

    els.route.addEventListener("dblclick", event => {
      const step = event.target.closest(".step");
      if (!step || event.target.closest("a, [data-toggle]")) return;
      const itemId = step.querySelector("[data-toggle]")?.dataset.toggle;
      if (!itemId) return;
      event.preventDefault();
      window.clearTimeout(pendingItemSelectTimer);
      pendingItemSelectTimer = 0;
      toggleCollectedItem(itemId, step);
    });

    document.addEventListener("click", event => {
      if (Date.now() >= suppressItemClickUntil || !event.target.closest(".step")) return;
      event.preventDefault();
      event.stopImmediatePropagation();
    }, true);

    document.addEventListener("click", event => {
      const regionSectionButton = event.target.closest("[data-region-section]");
      const regionButton = event.target.closest("[data-region]");
      const categoryButton = event.target.closest("[data-category]");
      const statusButton = event.target.closest("[data-status]");
      const resetFiltersButton = event.target.closest("[data-reset-filters]");
      const selectButton = event.target.closest("[data-select]");
      const toggleButton = event.target.closest("[data-toggle]");
      const startEditButton = event.target.closest("[data-start-edit]");
      const cancelEditButton = event.target.closest("[data-cancel-edit]");
      const resetEditButton = event.target.closest("[data-reset-edit]");
      const deleteItemButton = event.target.closest("[data-delete-item]");
      const exportButton = event.target.closest("[data-export-backup]");
      const importButton = event.target.closest("[data-import-backup]");
      const exportUserDataButton = event.target.closest("[data-export-user-data]");
      const importUserDataButton = event.target.closest("[data-import-user-data]");
      const exportTrackerDataButton = event.target.closest("[data-export-tracker-data]");
      const clearLocalEditsButton = event.target.closest("[data-clear-local-edits]");
      const toggleEditModeButton = event.target.closest("[data-toggle-edit-mode]");
      const themeToggleButton = event.target.closest("[data-theme-toggle]");
      const themeChoiceButton = event.target.closest("[data-theme-choice]");
      const themeSwitcher = event.target.closest("[data-theme-switcher]");
      const soundToggleButton = event.target.closest("[data-sound-toggle]");
      const addItemButton = event.target.closest("[data-add-item]");
      const wikiImportButton = event.target.closest("[data-wiki-import]");
      const cancelAddButton = event.target.closest("[data-cancel-add]");
      const addRegionButton = event.target.closest("[data-add-region]");
      const editRegionButton = event.target.closest("[data-edit-region]");
      const cancelRegionButton = event.target.closest("[data-cancel-region]");
      const deleteRegionButton = event.target.closest("[data-delete-region]");
      const resetRegionButton = event.target.closest("[data-reset-region]");
      const fillWikiButton = event.target.closest("[data-fill-wiki]");
      const clearSearchButton = event.target.closest("[data-clear-search]");
      const mobileBackButton = event.target.closest("[data-mobile-back]");

      if (!state.editMode && (addItemButton || wikiImportButton || addRegionButton || editRegionButton || resetEditButton || deleteItemButton || fillWikiButton || deleteRegionButton || resetRegionButton || exportTrackerDataButton || clearLocalEditsButton)) {
        return;
      }

      if (!themeSwitcher && isMobileLayout() && els.themeSwitcher?.classList.contains("open")) {
        closeThemeMenu(true);
        return;
      }

      if (mobileBackButton) {
        goBackMobileView(mobileBackButton.dataset.mobileBack);
        return;
      }

      if (themeToggleButton) {
        const isOpen = els.themeSwitcher?.classList.toggle("open");
        els.themeToggle?.setAttribute("aria-expanded", String(Boolean(isOpen)));
        playTone(500, 0.04, "triangle", 0.03);
        return;
      }

      if (themeChoiceButton) {
        applyTheme(themeChoiceButton.dataset.themeChoice, true);
        return;
      }

      if (soundToggleButton) {
        toggleSound();
        return;
      }

      if (!themeSwitcher) closeThemeMenu(true);

      if (regionSectionButton) {
        toggleRegionSection(regionSectionButton.dataset.regionSection);
        render();
        return;
      }

      if (clearSearchButton) {
        state.search = "";
        els.search.value = "";
        state.editing = false;
        state.adding = false;
        state.addingFromWiki = false;
        state.addingRegion = false;
        state.editingRegion = false;
        const first = firstVisibleItem();
        if (first) state.selectedId = first.id;
        render();
      }

      if (resetFiltersButton) {
        state.editing = false;
        state.adding = false;
        state.addingFromWiki = false;
        state.addingRegion = false;
        state.editingRegion = false;
        resetFilters();
        render();
      }

      if (toggleEditModeButton) {
        state.editMode = !state.editMode;
        if (!state.editMode) {
          state.editing = false;
          state.adding = false;
          state.addingFromWiki = false;
          state.addingRegion = false;
          state.editingRegion = false;
        }
        render();
      }

      if (regionButton) {
        const nextRegion = regionButton.dataset.region;
        playTone(440, 0.05, "triangle", 0.04);
        animateRouteRender(() => {
          state.region = nextRegion;
          state.editing = false;
          state.adding = false;
          state.addingFromWiki = false;
          state.addingRegion = false;
          state.editingRegion = false;
          state.selectedId = "";
          setMobileView("items", { pushHistory: true });
        });
        return;
      }

      if (categoryButton) {
        state.category = categoryButton.dataset.category;
        state.editing = false;
        state.adding = false;
        state.addingFromWiki = false;
        state.addingRegion = false;
        state.editingRegion = false;
        const first = firstVisibleItem();
        if (first) state.selectedId = first.id;
        render();
      }

      if (statusButton) {
        state.status = statusButton.dataset.status;
        state.editing = false;
        state.adding = false;
        state.addingFromWiki = false;
        state.addingRegion = false;
        state.editingRegion = false;
        const first = firstVisibleItem();
        if (first) state.selectedId = first.id;
        render();
      }

      if (selectButton) {
        const selectedId = selectButton.dataset.select;
        window.clearTimeout(pendingItemSelectTimer);
        pendingItemSelectTimer = window.setTimeout(() => {
          pendingItemSelectTimer = 0;
          playTone(550, 0.08, "sine", 0.05);
          state.selectedId = selectedId;
          state.editing = false;
          state.adding = false;
          state.addingFromWiki = false;
          state.addingRegion = false;
          state.editingRegion = false;
          render();
          animateDetailIn();
          setMobileView("detail", { pushHistory: true });
        }, 250);
        return;
      }

      if (toggleButton) {
        toggleCollectedItem(toggleButton.dataset.toggle, toggleButton);
        return;
      }

      if (startEditButton) {
        state.selectedId = startEditButton.dataset.startEdit;
        state.editing = true;
        state.adding = false;
        state.addingFromWiki = false;
        state.addingRegion = false;
        state.editingRegion = false;
        render();
      }

      if (cancelEditButton) {
        state.editing = false;
        render();
      }

      if (addItemButton) {
        state.adding = true;
        state.addingFromWiki = false;
        state.editing = false;
        state.addingRegion = false;
        state.editingRegion = false;
        render();
        setMobileView("detail", { pushHistory: true });
      }

      if (wikiImportButton) {
        state.adding = true;
        state.addingFromWiki = true;
        state.editing = false;
        state.addingRegion = false;
        state.editingRegion = false;
        render();
        setMobileView("detail", { pushHistory: true });
      }

      if (cancelAddButton) {
        state.adding = false;
        state.addingFromWiki = false;
        render();
      }

      if (addRegionButton) {
        state.addingRegion = true;
        state.editingRegion = false;
        state.adding = false;
        state.addingFromWiki = false;
        state.editing = false;
        render();
        setMobileView("detail", { pushHistory: true });
      }

      if (editRegionButton) {
        if (state.region === "Все локации") {
          alert("Сначала выбери конкретную локацию слева, потом нажми «Редактировать локацию».");
          return;
        }
        state.editingRegion = true;
        state.addingRegion = false;
        state.adding = false;
        state.addingFromWiki = false;
        state.editing = false;
        render();
        setMobileView("detail", { pushHistory: true });
      }

      if (cancelRegionButton) {
        state.addingRegion = false;
        state.editingRegion = false;
        render();
      }

      if (deleteRegionButton) {
        const regionName = deleteRegionButton.dataset.deleteRegion;
        const message = isCustomRegion(regionName)
          ? `Удалить локацию «${regionName}»? Предметы из нее будут перенесены в «Собственные заметки».`
          : `Убрать локацию «${regionName}» из левого списка?`;
        if (confirm(message)) {
          deleteRegion(regionName);
          render();
        }
      }

      if (resetRegionButton) {
        resetRegionEdit(resetRegionButton.dataset.resetRegion);
      }

      if (fillWikiButton) {
        const form = fillWikiButton.closest("form");
        if (form) fillFromWiki(form);
      }

      if (resetEditButton) {
        resetItemEdit(resetEditButton.dataset.resetEdit);
      }

      if (deleteItemButton) {
        const id = deleteItemButton.dataset.deleteItem;
        const item = items.find(entry => entry.id === id);
        if (item && confirm(`Удалить предмет «${item.name}» из трекера?`)) {
          deleteItem(id);
          render();
        }
      }

      if (exportTrackerDataButton) {
        exportTrackerDataFile();
        return;
      }

      if (clearLocalEditsButton) {
        clearLocalTrackerEdits();
        return;
      }

      if (exportButton) {
        exportBackup();
      }

      if (importButton) {
        els.backupInput.click();
      }

      if (exportUserDataButton) {
        exportUserData();
      }

      if (importUserDataButton) {
        els.userDataInput.click();
      }
    });

    window.addEventListener("popstate", event => {
      if (!isMobileLayout()) return;
      const payload = event.state;
      if (!payload?.eldenRingTrackerMobile) return;

      restoringMobileHistory = true;
      try {
        closeThemeMenu();
        if (payload.region) state.region = payload.region;
        state.selectedId = payload.itemId || "";
        setMobileView(payload.screen);
        render();
        if (payload.screen === "detail") animateDetailIn();
      } finally {
        restoringMobileHistory = false;
      }
    });

    document.addEventListener("keydown", event => {
      if (event.key === "Escape") closeThemeMenu();
    });

    document.addEventListener("submit", event => {
      const form = event.target.closest("[data-edit-form]");
      const createForm = event.target.closest("[data-create-form]");
      const createRegionForm = event.target.closest("[data-create-region-form]");
      const editRegionForm = event.target.closest("[data-edit-region-form]");
      if (!form && !createForm && !createRegionForm && !editRegionForm) return;
      event.preventDefault();
      if (form) saveItemEdit(form.dataset.editForm, form);
      if (createForm) createItem(createForm);
      if (createRegionForm) createRegion(createRegionForm);
      if (editRegionForm) saveRegionEdit(editRegionForm.dataset.editRegionForm, editRegionForm);
      render();
    });

    document.addEventListener("input", event => {
      const noteInput = event.target.closest("[data-player-note]");
      if (!noteInput) return;
      const id = noteInput.dataset.playerNote;
      const value = noteInput.value.trim();
      if (value) {
        state.playerNotes[id] = value;
      } else {
        delete state.playerNotes[id];
      }
      savePlayerNotes();
    });

    els.search.addEventListener("input", event => {
      state.search = event.target.value;
      state.editing = false;
      state.adding = false;
      state.addingFromWiki = false;
      state.addingRegion = false;
      state.editingRegion = false;
      const first = firstVisibleItem();
      if (first) state.selectedId = first.id;
      render();
    });

    if (els.category) {
      els.category.addEventListener("change", event => {
        state.category = event.target.value;
        state.editing = false;
        state.adding = false;
        state.addingFromWiki = false;
        state.addingRegion = false;
        state.editingRegion = false;
        render();
      });
    }

    if (els.source) {
      els.source.addEventListener("change", event => {
        state.source = event.target.value;
        state.editing = false;
        state.adding = false;
        state.addingFromWiki = false;
        state.addingRegion = false;
        state.editingRegion = false;
        render();
      });
    }

    els.backupInput.addEventListener("change", event => {
      importBackup(event.target.files[0]);
      event.target.value = "";
    });

    els.userDataInput.addEventListener("change", event => {
      importUserData(event.target.files[0]);
      event.target.value = "";
    });

    render();
  </script>
  <script>
    let deferredInstallPrompt = null;
    const installButton = document.getElementById("install-btn");
    const topbar = document.querySelector(".topbar");

    window.addEventListener("beforeinstallprompt", event => {
      event.preventDefault();
      deferredInstallPrompt = event;
      installButton?.classList.add("is-visible");
      topbar?.classList.add("install-available");
    });

    installButton?.addEventListener("click", async () => {
      if (!deferredInstallPrompt) return;
      deferredInstallPrompt.prompt();
      const { outcome } = await deferredInstallPrompt.userChoice;
      if (outcome === "accepted") {
        installButton.classList.remove("is-visible");
        topbar?.classList.remove("install-available");
      }
      deferredInstallPrompt = null;
    });

    window.addEventListener("appinstalled", () => {
      deferredInstallPrompt = null;
      installButton?.classList.remove("is-visible");
      topbar?.classList.remove("install-available");
    });

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        const appShellVersion = "2026.06.23-03";
        const appShellVersionKey = "elden-ring-app-shell-version";
        const storedShellVersion = localStorage.getItem(appShellVersionKey);
        if (storedShellVersion !== appShellVersion) {
          localStorage.setItem(appShellVersionKey, appShellVersion);
          Promise.all([
            navigator.serviceWorker.getRegistrations().then(registrations =>
              Promise.all(registrations.map(registration => registration.unregister()))
            ),
            "caches" in window
              ? caches.keys().then(keys =>
                  Promise.all(
                    keys
                      .filter(key => key.startsWith("elden-ring-tracker-"))
                      .map(key => caches.delete(key))
                  )
                )
              : Promise.resolve()
          ]).then(() => {
            const cleanUrl = new URL(window.location.href);
            cleanUrl.searchParams.set("pwa", appShellVersion);
            window.location.replace(cleanUrl.toString());
          });
          return;
        }

        let reloadForUpdate = false;
        const serviceWorkerUrl = `./sw.js?v=${encodeURIComponent(trackerMeta.databaseVersion)}`;
        navigator.serviceWorker.register(serviceWorkerUrl, { updateViaCache: "none" })
          .then(registration => {
            console.log("SW registered:", registration.scope);
            registration.addEventListener("updatefound", () => {
              const newWorker = registration.installing;
              if (!newWorker) return;
              newWorker.addEventListener("statechange", () => {
                if (newWorker.state === "installed" && navigator.serviceWorker.controller) {
                  reloadForUpdate = true;
                  newWorker.postMessage({ action: "skipWaiting" });
                }
              });
            });
            registration.update();
          })
          .catch(error => console.log("SW error:", error));

        let refreshing = false;
        navigator.serviceWorker.addEventListener("controllerchange", () => {
          if (!reloadForUpdate || refreshing) return;
          refreshing = true;
          window.location.reload();
        });
      });
    }
  </script>
</body>
</html>
