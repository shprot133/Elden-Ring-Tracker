  <link rel="apple-touch-icon" href="icons/icon-192.png?v=2">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Elden Ring Tracker</title>
  <script>
    (() => {
      const themes = new Set(["golden-order", "caria", "mohgwyn", "erdtree", "dragon", "shadow"]);
      let theme = "golden-order";
      try {
        const storedTheme = localStorage.getItem("elden_ring_theme");
        if (themes.has(storedTheme)) theme = storedTheme;
      } catch {
        theme = "golden-order";
      }
      document.documentElement.dataset.theme = theme;
    })();
  </script>

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background:
        radial-gradient(circle at 42% -10%, rgba(var(--theme-accent-rgb), .18), transparent 34rem),
        linear-gradient(135deg, rgba(var(--theme-white-rgb), .025) 25%, transparent 25%) 0 0 / 28px 28px,
        var(--bg);
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .app {
      display: grid;
      grid-template-rows: auto 1fr;
      height: 100vh;
      min-height: 0;
      overflow: hidden;
    }

    .topbar {
      display: grid;
      grid-template-columns: minmax(260px, 1fr) minmax(360px, 680px) auto auto auto auto;
      align-items: center;
      gap: 20px;
      padding: 18px 24px;
      border-bottom: 1px solid var(--line);
      background: rgba(var(--theme-bg-primary-rgb), .82);
      backdrop-filter: blur(14px);
      position: sticky;
      top: 0;
      z-index: 20;
    }

    .topbar.install-available {
      grid-template-columns: minmax(260px, 1fr) minmax(360px, 680px) auto auto auto auto auto;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    h1 {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 24px;
      font-weight: 700;
      letter-spacing: 0;
      line-height: 1.05;
    }

    .subtitle {
      margin-top: 4px;
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .search {
      position: relative;
    }

    .search input {
      width: 100%;
      height: 46px;
      padding: 0 78px 0 16px;
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(var(--theme-bg-tertiary-rgb), .92);
      outline: none;
    }

    .search input:focus {
      border-color: rgba(var(--theme-accent-strong-rgb), .72);
      box-shadow: 0 0 0 3px rgba(var(--theme-accent-rgb), .14);
    }

    .search span {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--gold);
      pointer-events: none;
    }

    .search svg {
      width: 18px;
      height: 18px;
      display: block;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .clear-search {
      position: absolute;
      right: 42px;
      top: 50%;
      width: 24px;
      height: 24px;
      display: none;
      place-items: center;
      transform: translateY(-50%);
      color: var(--muted);
      border: 1px solid rgba(var(--theme-text-soft-rgb), .18);
      border-radius: 50%;
      background: rgba(var(--theme-bg-primary-rgb), .44);
      line-height: 1;
    }

    .search.has-value .clear-search {
      display: grid;
    }

    .clear-search:hover {
      color: var(--gold-2);
      border-color: rgba(var(--theme-accent-strong-rgb), .52);
      background: rgba(var(--theme-accent-rgb), .12);
    }

    .stats {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }

    .stat {
      min-width: 86px;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(var(--theme-bg-secondary-rgb), .86);
      text-align: right;
    }

    .stat strong {
      display: block;
      color: var(--gold-2);
      font-size: 18px;
      line-height: 1;
    }

    .stat span {
      color: var(--muted);
      font-size: 11px;
    }

    .theme-switcher {
      position: relative;
      justify-self: end;
    }

    .theme-button {
      height: 38px;
      padding: 0 13px;
      color: var(--gold-2);
      border: 1px solid rgba(var(--theme-accent-rgb), .34);
      border-radius: var(--radius);
      background: rgba(var(--theme-bg-secondary-rgb), .86);
      font-size: 13px;
      font-weight: 800;
    }

    .sound-button {
      width: 42px;
      height: 38px;
      display: inline-grid;
      place-items: center;
      color: var(--gold-2);
      border: 1px solid rgba(var(--theme-accent-rgb), .34);
      border-radius: var(--radius);
      background: rgba(var(--theme-bg-secondary-rgb), .86);
      font-size: 17px;
      line-height: 1;
    }

    .sound-button:hover,
    .sound-button[aria-pressed="false"] {
      border-color: rgba(var(--theme-accent-strong-rgb), .58);
      background: rgba(var(--theme-accent-rgb), .12);
    }

    .theme-button:hover,
    .theme-switcher.open .theme-button {
      border-color: rgba(var(--theme-accent-strong-rgb), .58);
      background: rgba(var(--theme-accent-rgb), .12);
    }

    .install-button {
      height: 38px;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 0 13px;
      color: var(--gold-2);
      border: 1px solid rgba(var(--theme-accent-rgb), .34);
      border-radius: var(--radius);
      background: rgba(var(--theme-bg-secondary-rgb), .86);
      font-size: 13px;
      font-weight: 800;
      white-space: nowrap;
    }

    .install-button.is-visible {
      display: inline-flex;
    }

    .install-button:hover {
      border-color: rgba(var(--theme-accent-strong-rgb), .58);
      background: rgba(var(--theme-accent-rgb), .12);
    }

    .theme-menu {
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      z-index: 1000;
      width: 236px;
      display: none;
      gap: 4px;
      padding: 8px;
      border: 1px solid rgba(var(--theme-accent-rgb), .28);
      border-radius: var(--radius);
      background: rgba(var(--theme-bg-secondary-rgb), .98);
      box-shadow: 0 18px 36px rgba(var(--theme-black-rgb), .46);
    }

    .theme-switcher.open .theme-menu {
      display: grid;
    }

    .theme-option {
      width: 100%;
      padding: 9px 10px;
      color: var(--soft);
      border: 1px solid transparent;
      border-radius: 6px;
      background: transparent;
      text-align: left;
      font-size: 13px;
      font-weight: 750;
    }

    .theme-option:hover {
      color: var(--text);
      border-color: rgba(var(--theme-accent-rgb), .22);
      background: rgba(var(--theme-accent-rgb), .08);
    }

    .theme-option.active {
      color: var(--gold-2);
      border-color: rgba(var(--theme-accent-rgb), .38);
      background: rgba(var(--theme-accent-rgb), .13);
    }

    .official-logo {
      display: flex;
      justify-content: flex-end;
      min-width: 150px;
    }

    .official-logo img {
      width: 152px;
      max-width: 18vw;
      height: auto;
      filter: invert(77%) sepia(49%) saturate(487%) hue-rotate(359deg) brightness(99%) contrast(92%) drop-shadow(0 0 18px rgba(var(--theme-accent-rgb), .2));
      opacity: .92;
    }

    .layout {
      display: grid;
      grid-template-columns: 286px minmax(420px, 1fr) 362px;
      gap: 1px;
      background: var(--line);
      height: 100%;
      min-height: 0;
      overflow: hidden;
    }

    .sidebar,
    .content,
    .inspector {
      min-height: 0;
      background: rgba(var(--theme-bg-primary-rgb), .92);
    }

    .sidebar {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      padding: 20px 16px;
      overflow: hidden;
    }

    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 12px;
      color: var(--soft);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .region-list {
      display: grid;
      align-content: start;
      gap: 8px;
      min-height: 0;
      margin-bottom: 0;
      overflow: auto;
      padding-right: 2px;
      scrollbar-gutter: stable;
    }

    .region-list,
    .content,
    .inspector {
      scrollbar-width: thin;
      scrollbar-color: rgba(var(--theme-accent-rgb), .55) rgba(var(--theme-bg-tertiary-rgb), .7);
    }

    .region-list::-webkit-scrollbar,
    .content::-webkit-scrollbar,
    .inspector::-webkit-scrollbar {
      width: 10px;
    }

    .region-list::-webkit-scrollbar-track,
    .content::-webkit-scrollbar-track,
    .inspector::-webkit-scrollbar-track {
      background: rgba(var(--theme-bg-tertiary-rgb), .7);
    }

    .region-list::-webkit-scrollbar-thumb,
    .content::-webkit-scrollbar-thumb,
    .inspector::-webkit-scrollbar-thumb {
      border: 2px solid rgba(var(--theme-bg-tertiary-rgb), .7);
      border-radius: 999px;
      background: rgba(var(--theme-accent-rgb), .55);
    }

    .region-list::-webkit-scrollbar-thumb:hover,
    .content::-webkit-scrollbar-thumb:hover,
    .inspector::-webkit-scrollbar-thumb:hover {
      background: rgba(var(--theme-accent-strong-rgb), .72);
    }

    .region-section {
      display: grid;
      gap: 8px;
    }

    .region-section + .region-section {
      margin-top: 8px;
      padding-top: 10px;
      border-top: 1px solid rgba(var(--theme-text-soft-rgb), .12);
    }

    .region-section-toggle {
      width: 100%;
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 8px;
      align-items: center;
      padding: 8px 10px;
      color: var(--gold-2);
      border: 1px solid rgba(var(--theme-accent-rgb), .22);
      border-radius: var(--radius);
      background: rgba(var(--theme-accent-rgb), .06);
      text-align: left;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .06em;
      text-transform: uppercase;
    }

    .section-arrow {
      color: var(--muted);
      font-size: 11px;
    }

    .section-progress {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0;
      text-transform: none;
    }

    .region-section-items {
      display: grid;
      gap: 8px;
    }

    .region-btn {
      width: 100%;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
      padding: 11px 12px;
      color: var(--soft);
      border: 1px solid transparent;
      border-radius: var(--radius);
      background: transparent;
      text-align: left;
    }

    .region-btn:hover,
    .region-btn.active {
      color: var(--text);
      border-color: rgba(var(--theme-accent-rgb), .34);
      background: rgba(var(--theme-accent-rgb), .08);
    }

    .region-btn.active {
      padding-left: 9px;
      border-left: 3px solid var(--theme-active-region-border);
      box-shadow: inset 3px 0 12px rgba(var(--theme-accent-strong-rgb), .07);
    }

    .region-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      grid-column: 1 / -1;
      color: var(--muted);
      font-size: 12px;
    }

    .bar {
      height: 4px;
      flex: 1;
      border-radius: 99px;
      background: var(--theme-border);
      overflow: hidden;
    }

    .bar i {
      display: block;
      width: var(--value);
      height: 100%;
      background: linear-gradient(90deg, var(--theme-progress), var(--gold));
    }

    .sidebar-actions {
      display: grid;
      gap: 10px;
      margin-top: 18px;
    }

    .filters label {
      display: grid;
      gap: 7px;
      color: var(--muted);
      font-size: 12px;
    }

    select {
      height: 38px;
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel-2);
      padding: 0 10px;
      outline: none;
    }

    .toggle-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 4px;
    }

    .chip {
      padding: 6px 9px;
      color: var(--muted);
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(var(--theme-bg-tertiary-rgb), .8);
      font-size: 11px;
      line-height: 1.15;
    }

    .chip.active {
      color: var(--theme-bg-primary);
      border-color: var(--gold);
      background: var(--gold);
    }

    .chip:disabled,
    .chip.disabled {
      opacity: .45;
      cursor: not-allowed;
    }

    .action-chip {
      border-color: rgba(var(--theme-accent-strong-rgb), .45);
      color: var(--gold-2);
    }

    .filter-count {
      color: var(--soft);
      font-size: 12px;
      font-weight: 700;
      padding: 5px 0;
    }

    .content {
      display: block;
      min-width: 0;
      min-height: 0;
      overflow: auto;
      scrollbar-gutter: stable;
    }

    .region-head {
      position: relative;
      overflow: hidden;
      padding: 14px 26px 12px;
      border-bottom: 1px solid var(--line);
      background:
        linear-gradient(110deg, rgba(var(--theme-accent-rgb), .13), transparent 54%),
        var(--panel);
    }

    .region-head h2 {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 25px;
      line-height: 1.12;
    }

    .region-head p {
      max-width: 760px;
      margin: 6px 0 12px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.42;
    }

    .tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .tabs-label {
      margin: 8px 0 5px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .tab {
      padding: 6px 9px;
      color: var(--soft);
      border: 1px solid rgba(var(--theme-text-soft-rgb), .18);
      border-radius: 999px;
      background: rgba(var(--theme-bg-primary-rgb), .38);
      font-size: 11px;
      line-height: 1.15;
    }

    .tab.active {
      color: var(--theme-bg-primary);
      border-color: var(--gold-2);
      background: var(--gold-2);
    }

    .tab-count {
      margin-left: 6px;
      opacity: .72;
      font-size: 11px;
    }

    .sort-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 6px;
      margin-top: 7px;
    }

    .sort-row > span {
      min-width: 78px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .route {
      padding: 22px 26px 34px;
      overflow: visible;
      opacity: 1;
      transform: translateY(0);
      transition: opacity .15s ease, transform .15s ease;
    }

    .route.is-fading-out {
      opacity: 0;
      transform: translateY(4px);
    }

    .route.is-fading-in {
      animation: routeFadeIn .15s ease both;
    }

    @keyframes routeFadeIn {
      from {
        opacity: 0;
        transform: translateY(4px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .empty {
      padding: 28px;
      color: var(--muted);
      border: 1px dashed var(--line);
      border-radius: var(--radius);
      background: rgba(var(--theme-bg-tertiary-rgb), .58);
    }

    .group {
      margin-bottom: 28px;
    }

    .group h3 {
      margin: 0 0 12px;
      color: var(--gold-2);
      font-size: 14px;
      letter-spacing: .06em;
      text-transform: uppercase;
    }

    .steps {
      display: grid;
      gap: 8px;
      position: relative;
    }

    .step {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 12px;
      align-items: start;
      padding: 13px 14px;
      border: 1px solid rgba(var(--theme-text-soft-rgb), .12);
      border-radius: var(--radius);
      background: rgba(var(--theme-bg-secondary-rgb), .82);
      box-shadow: 0 10px 26px var(--shadow);
      transition: background .3s ease, background-color .3s ease, border-color .3s ease, opacity .3s ease, transform .18s ease;
      user-select: none;
    }

    .step:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 32px rgba(var(--theme-black-rgb), .52), 0 0 0 1px rgba(var(--theme-accent-rgb), .14);
    }

    .step.selected {
      border-color: rgba(var(--theme-accent-strong-rgb), .55);
      background: rgba(var(--theme-accent-rgb), .1);
    }

    .step.done {
      border-color: rgba(var(--theme-done-border-rgb), .38);
      background:
        linear-gradient(90deg, rgba(var(--theme-done-border-rgb), .24), rgba(var(--theme-done-border-rgb), .08) 54%, rgba(var(--theme-bg-secondary-rgb), .82)),
        rgba(var(--theme-done-bg-rgb), .86);
    }

    .step.done:hover {
      box-shadow: 0 14px 32px rgba(var(--theme-black-rgb), .52), 0 0 0 1px rgba(var(--theme-done-border-rgb), .28);
    }

    .step.done.selected {
      border-color: rgba(var(--theme-done-border-rgb), .58);
      background:
        linear-gradient(90deg, rgba(var(--theme-done-border-rgb), .3), rgba(var(--theme-done-border-rgb), .1) 54%, rgba(var(--theme-accent-rgb), .08)),
        rgba(var(--theme-done-bg-rgb), .9);
    }

    .check {
      width: 24px;
      height: 24px;
      display: grid;
      place-items: center;
      color: transparent;
      border: 1px solid rgba(var(--theme-text-soft-rgb), .38);
      border-radius: 50%;
      background: var(--panel-3);
      flex: 0 0 auto;
      font-size: 14px;
      font-weight: 900;
      line-height: 1;
      transition: background-color .2s ease, border-color .2s ease, color .2s ease, transform .2s ease;
    }

    .check-mark {
      display: block;
      color: var(--theme-done-text);
      opacity: 0;
      transform: scale(.25) rotate(-18deg);
      transition: opacity .2s ease, transform .2s ease;
    }

    @keyframes checkBounce {
      0% { transform: scale(1); }
      30% { transform: scale(1.28); }
      55% { transform: scale(.88); }
      75% { transform: scale(1.10); }
      100% { transform: scale(1.04); }
    }

    .step.done .check {
      border-color: var(--theme-done-check-border);
      background: var(--theme-done-check-bg);
      transform: scale(1.04);
      animation: checkBounce .35s ease both;
    }

    .step.done .check-mark {
      opacity: 1;
      transform: scale(1) rotate(0deg);
    }

    .step-main {
      display: block;
      align-items: center;
      min-width: 0;
      background: transparent;
      border: 0;
      color: inherit;
      padding: 0;
      text-align: left;
    }

    .step-title {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      margin-bottom: 5px;
      font-weight: 750;
    }

    .step-title span:first-child {
      transition: color .3s ease, opacity .3s ease, text-decoration-color .3s ease;
    }

    .step.done .step-title span:first-child {
      color: var(--muted);
      text-decoration: line-through;
      opacity: .5;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      height: 22px;
      padding: 0 8px;
      color: var(--theme-tag-text);
      border: 1px solid rgba(var(--theme-tag-border-rgb), .55);
      border-radius: 999px;
      background: rgba(var(--theme-tag-border-rgb), .14);
      font-size: 11px;
      font-weight: 650;
    }

    .note {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .links {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 36px;
      height: 30px;
      padding: 0 8px;
      color: var(--soft);
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(var(--theme-bg-primary-rgb), .42);
      font-size: 12px;
    }

    .link:hover {
      color: var(--gold-2);
      border-color: rgba(var(--theme-accent-strong-rgb), .5);
    }

    .map-link {
      border-color: rgba(var(--theme-accent-rgb), .38);
      background: rgba(var(--theme-accent-dim-rgb), .14);
    }

    .inspector {
      padding: 22px;
      overflow: auto;
      scrollbar-gutter: stable;
      background:
        linear-gradient(180deg, rgba(var(--theme-accent-rgb), .08), transparent 230px),
        rgba(var(--theme-bg-primary-rgb), .94);
    }

    .detail {
      will-change: transform, opacity;
    }

    .detail.is-sliding {
      animation: detailSlideIn .2s ease both;
    }

    @keyframes detailSlideIn {
      from {
        opacity: 0;
        transform: translateX(18px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .detail-kicker {
      color: var(--gold);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .detail h2 {
      margin: 9px 0 8px;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 28px;
      line-height: 1.1;
    }

    .detail-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 14px;
    }

    .detail-text {
      color: var(--soft);
      line-height: 1.58;
      white-space: pre-line;
    }

    .detail-section {
      display: grid;
      gap: 7px;
      padding: 14px 0;
      border-top: 1px solid var(--line);
    }

    .detail-section:first-of-type {
      border-top: 0;
      padding-top: 4px;
    }

    .detail-section-title {
      color: var(--gold-2);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .detail-row {
      display: grid;
      grid-template-columns: 96px 1fr;
      gap: 10px;
      color: var(--soft);
      font-size: 13px;
      line-height: 1.45;
    }

    .detail-row span:first-child {
      color: var(--muted);
    }

    .detail-links {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .player-note {
      width: 100%;
      min-height: 86px;
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel-2);
      outline: none;
      padding: 10px;
      resize: vertical;
      line-height: 1.45;
    }

    .player-note:focus {
      border-color: rgba(var(--theme-accent-strong-rgb), .72);
      box-shadow: 0 0 0 3px rgba(var(--theme-accent-rgb), .14);
    }

    .important {
      margin: 18px 0;
      padding: 12px;
      color: var(--theme-danger-text);
      border: 1px solid rgba(var(--theme-danger-rgb), .36);
      border-radius: var(--radius);
      background: rgba(var(--theme-danger-rgb), .08);
      line-height: 1.45;
    }

    .detail-grid {
      display: grid;
      gap: 10px;
      margin-top: 14px;
    }

    .detail-row {
      display: grid;
      grid-template-columns: 110px 1fr;
      gap: 10px;
      align-items: start;
      padding: 10px 0;
      border-bottom: 1px solid rgba(var(--theme-text-soft-rgb), .1);
    }

    .detail-row:last-child {
      border-bottom: 0;
    }

    .detail-row strong {
      color: var(--muted);
      font-size: 11px;
      letter-spacing: .06em;
      text-transform: uppercase;
    }

    .detail-row span {
      color: var(--soft);
      line-height: 1.45;
    }

    .detail-section .important {
      margin: 0;
    }

    .fandom-checklist {
      display: grid;
      gap: 8px;
      margin: 18px 0;
      padding: 12px;
      border: 1px solid rgba(var(--theme-accent-rgb), .3);
      border-radius: var(--radius);
      background: rgba(var(--theme-accent-rgb), .07);
    }

    .fandom-checklist strong {
      color: var(--gold-2);
      font-size: 13px;
    }

    .fandom-checklist span {
      color: var(--soft);
      font-size: 13px;
      line-height: 1.35;
    }

    .fandom-checklist .muted {
      color: var(--muted);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 18px;
    }

    .mobile-back {
      display: none;
    }

    .primary,
    .secondary {
      min-height: 38px;
      padding: 0 13px;
      border-radius: var(--radius);
      border: 1px solid transparent;
      font-weight: 720;
    }

    .primary {
      color: var(--theme-bg-primary);
      background: var(--gold-2);
    }

    .secondary {
      color: var(--soft);
      border-color: var(--line);
      background: var(--panel-2);
    }

    .mini-progress {
      margin-top: 24px;
      padding-top: 18px;
      border-top: 1px solid var(--line);
    }

    .mini-progress p {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .editor {
      display: grid;
      gap: 12px;
      margin-top: 18px;
      padding-top: 18px;
      border-top: 1px solid var(--line);
    }

    .editor-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .editor .wide {
      grid-column: 1 / -1;
    }

    .editor label {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .field-help {
      color: var(--muted);
      font-size: 11px;
      font-weight: 500;
      line-height: 1.35;
    }

    .editor input,
    .editor select,
    .editor textarea {
      width: 100%;
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel-2);
      outline: none;
      padding: 10px;
    }

    .editor textarea {
      min-height: 140px;
      resize: vertical;
      line-height: 1.5;
    }

    .editor textarea.compact {
      min-height: 82px;
    }

    .editor input:focus,
    .editor select:focus,
    .editor textarea:focus {
      border-color: rgba(var(--theme-accent-strong-rgb), .72);
      box-shadow: 0 0 0 3px rgba(var(--theme-accent-rgb), .14);
    }

    .app:not(.edit-mode) .edit-only {
      display: none;
    }

    .hidden-input {
      display: none;
    }

    @media (max-width: 1100px) {
      .topbar,
      .topbar.install-available {
        grid-template-columns: 1fr;
      }

      .stats {
        justify-content: flex-start;
      }

      .theme-switcher {
        justify-self: start;
      }

      .official-logo {
        justify-content: flex-start;
      }

      .official-logo img {
        max-width: 180px;
      }

      .layout {
        grid-template-columns: 240px minmax(0, 1fr);
      }

      .inspector {
        grid-column: 1 / -1;
        min-height: auto;
      }
    }

    @media (max-width: 768px) {
      .app {
        height: 100vh;
        min-height: 100vh;
        overflow: hidden;
      }

      .topbar {
        grid-template-columns: minmax(0, 1fr) 44px 44px;
        grid-template-areas:
          "brand brand brand"
          "search sound theme"
          "stats stats stats";
        align-items: center;
        padding: 12px;
        gap: 10px;
      }

      .topbar.install-available {
        grid-template-columns: minmax(0, 1fr) 44px 44px 44px;
        grid-template-areas:
          "brand brand brand brand"
          "search install sound theme"
          "stats stats stats stats";
      }

      .brand {
        grid-area: brand;
      }

      h1 {
        font-size: 21px;
      }

      .search {
        grid-area: search;
        min-width: 0;
      }

      .search input {
        height: 42px;
      }

      .stats {
        grid-area: stats;
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
      }

      .theme-switcher {
        grid-area: theme;
        justify-self: stretch;
      }

      .sound-button {
        grid-area: sound;
        width: 44px;
        height: 42px;
      }

      .install-button {
        grid-area: install;
        width: 44px;
        height: 42px;
        padding: 0;
        font-size: 0;
      }

      .install-button::before {
        content: "⬇";
        font-size: 18px;
      }

      .theme-button {
        width: 100%;
        height: 42px;
        padding: 0;
        font-size: 0;
        line-height: 1;
      }

      .theme-button::before {
        content: "🎨";
        font-size: 18px;
      }

      .theme-menu {
        left: auto;
        right: 0;
        width: min(280px, calc(100vw - 28px));
        z-index: 1000;
      }

      .stat {
        min-width: 0;
        padding: 8px;
        text-align: center;
      }

      .official-logo {
        display: none;
      }

      .layout {
        display: block;
        height: 100%;
        min-height: 0;
        overflow: hidden;
        background: var(--bg);
      }

      .sidebar,
      .content,
      .inspector {
        display: none;
        height: 100%;
        min-height: 0;
        overflow: auto;
        scrollbar-gutter: stable;
      }

      .app:not([data-mobile-view]) .sidebar,
      .app[data-mobile-view="regions"] .sidebar {
        display: grid;
      }

      .app[data-mobile-view="items"] .content {
        display: block;
      }

      .app[data-mobile-view="detail"] .inspector {
        display: block;
      }

      .sidebar {
        grid-template-rows: auto minmax(0, 1fr) auto;
        padding: 14px 12px 18px;
        border-bottom: 0;
      }

      .region-list {
        grid-template-columns: 1fr;
        max-height: none;
        min-height: 0;
        overflow: auto;
      }

      .region-btn {
        min-height: 52px;
        padding: 12px;
      }

      .mobile-back {
        position: sticky;
        top: 0;
        z-index: 1;
        width: calc(100% - 24px);
        min-height: 42px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 12px 12px 0;
        color: var(--gold-2);
        border: 1px solid rgba(var(--theme-accent-rgb), .28);
        border-radius: var(--radius);
        background: rgba(var(--theme-bg-secondary-rgb), .96);
        box-shadow: 0 10px 24px rgba(var(--theme-black-rgb), .28);
        font-weight: 800;
      }

      .region-head,
      .route {
        padding-left: 16px;
        padding-right: 16px;
      }

      .region-head {
        margin-top: 12px;
      }

      .steps {
        overflow: hidden;
      }

      .step {
        position: relative;
        overflow: hidden;
        touch-action: pan-y;
      }

      .step::before {
        content: "";
        position: absolute;
        inset: 0 auto 0 0;
        width: min(120px, 45%);
        opacity: 0;
        background: linear-gradient(90deg, rgba(var(--theme-done-border-rgb), .86), rgba(var(--theme-done-border-rgb), .18));
        transition: opacity .16s ease;
        pointer-events: none;
      }

      .step::after {
        content: "✓";
        position: absolute;
        left: 24px;
        top: 50%;
        z-index: 0;
        opacity: 0;
        color: var(--theme-done-text);
        font-size: 24px;
        font-weight: 900;
        transform: translateY(-50%) scale(.88);
        transition: opacity .16s ease, transform .16s ease;
        pointer-events: none;
      }

      .step.done::before {
        background: linear-gradient(90deg, rgba(var(--theme-danger-rgb), .76), rgba(var(--theme-danger-rgb), .16));
      }

      .step.done::after {
        content: "✕";
        color: var(--theme-danger-text);
      }

      .step.swiping::before,
      .step.swiping::after {
        opacity: 1;
      }

      .step.swiping::after {
        transform: translateY(-50%) scale(1);
      }

      .step.swiping > * {
        position: relative;
        z-index: 1;
      }

        transition: transform .2s ease, background .3s ease, background-color .3s ease, border-color .3s ease, opacity .3s ease;

        transition: transform .15s ease;

        flex-wrap: nowrap;
        overflow-x: auto;
        white-space: nowrap;
        padding-bottom: 4px;
        scrollbar-width: thin;

        overflow-x: auto;
        white-space: nowrap;
        padding-bottom: 3px;
      }

      .chip {
        flex: 0 0 auto;
      }

      .editor-grid {
        grid-template-columns: 1fr;
      }

      .step {
        grid-template-columns: auto minmax(0, 1fr);
        padding: 12px;
      }

      .check {
        width: 24px;
        height: 24px;
      }

      .step-title {
        font-size: 14px;
      }

      .links {
        grid-column: 1 / -1;
        display: grid;
        grid-template-columns: 1fr;
        gap: 7px;
      }

      .link {
        justify-content: center;
        min-height: 34px;
      }

      .inspector {
        padding: 0 16px 22px;
      }

      .detail {
        padding-top: 16px;
      }
    }

    @media (max-width: 520px) {
      .topbar {
        padding: 12px;
      }

      .stats {
        gap: 6px;
      }

      .stat strong {
        font-size: 16px;
      }

      .stat span {
        font-size: 10px;
      }

      .region-list {
        grid-template-columns: 1fr;
        max-height: none;
      }

      .actions,
      .detail-links {
        display: grid;
        grid-template-columns: 1fr;
      }

      .primary,
      .secondary {
        width: 100%;
        justify-content: center;
      }

      .region-head h2 {
        font-size: 23px;

      .route {
        padding-top: 16px;
      }

      .step {
        grid-template-columns: 1fr;
      }

      .check {
        justify-self: start;
      }

      .links {
        grid-column: auto;
      }

      .detail h2 {
        font-size: 23px;
      }
    }
  </style>

    function localizeCatalogName(name) {
      for (const rule of numberedCatalogNames) {
        const match = name.match(rule.pattern);
        if (match) return `${rule.base} (${match[1]})`;
      }
      return ruCatalogNames[name] || name;
    }

    function createCatalogItems(category, names, wikiRoot, note) {
      return names.map(name => {
        const localizedName = localizeCatalogName(name);
        return {
          id: catalogId(category, localizedName),
          name: localizedName,
          aliases: localizedName === name ? [] : [name],
          category,
          // TODO: уточнить регион.
          region: "Крепость круглого стола",
          location: "См. страницу Fandom предмета",
          source: "Fandom",
          note,
          warning: "Регион временный. Локацию и маршрут нужно уточнить по Fandom или твоему Notion.",
          links: [{ label: "Fandom", url: `${wikiRoot}${wikiSlug(localizedName)}` }]
        };
      });
    }

    function isRussianFandomUrl(url = "") {
      return url.includes("eldenring.fandom.com/ru/wiki/");
    }

    function isFandomSearchUrl(url = "") {
      return isRussianFandomUrl(url) && url.includes("Special:Search");
    }

    function isMapGenieUrl(url = "") {
      return url.includes("mapgenie.io/elden-ring/maps/");
    }

    function itemMapLink(item) {
      return (item.links || []).find(link => isMapGenieUrl(link.url));
    }

    function regularLinks(links = []) {
      return links.filter(link => !isMapGenieUrl(link.url));
    }

    function directFandomLink(item) {
      return (item.links || []).find(link => isRussianFandomUrl(link.url) && !isFandomSearchUrl(link.url));
    }

    function fandomTitleFromUrl(url = "") {
      try {
        const parsed = new URL(url, window.location.href);
        const marker = "/ru/wiki/";
        const markerIndex = parsed.pathname.indexOf(marker);
        if (markerIndex < 0) return "";
        const rawTitle = parsed.pathname.slice(markerIndex + marker.length).split("/")[0];
        return decodeURIComponent(rawTitle).replaceAll("_", " ");
      } catch {
        return "";
      }
    }

    function itemFandomTitle(item) {
      return fandomTitleFromUrl(directFandomLink(item)?.url || "") || item.name;
    }

    function syncMapLink(links = [], mapUrl = "") {
      const cleanLinks = regularLinks(links);
      const url = mapUrl.trim();
      if (!url) return cleanLinks;
      return [{ label: "MapGenie", url }, ...cleanLinks];
    }

    function normalizeMapLinks(item) {
      if (!Array.isArray(item.links)) item.links = [];
      item.links = item.links.map(link => {
        if (!isMapGenieUrl(link.url)) return link;
        return { ...link, label: "MapGenie" };
      });
    }

    function mapGenieSearchUrl(item) {
      const query = [item.name, item.location]
        .filter(Boolean)
        .join(" ");
      return `https://mapgenie.io/elden-ring/maps/the-lands-between?search=${encodeURIComponent(query)}`;
    }

    function isFarmOrDropItem(item) {
      const text = [item.source, item.note, item.warning, item.location]
        .filter(Boolean)
        .join(" ")
        .toLocaleLowerCase("ru");
      return text.includes("фарм") || text.includes("дроп");
    }

    function hasManualMapLinkChoice(item) {
      const edit = state.edits[item.id];
      return edit && Array.isArray(edit.links) && !edit.links.some(link => isMapGenieUrl(link.url));
    }

    function shouldReceiveRegionalMapLink(item) {
      const skippedCategories = new Set(["Стрелы и болты", "Инструменты"]);
      return mapGenieAutoSearchRegions.has(parentRegion(item.region)) &&
        !skippedCategories.has(item.category) &&
        !isFarmOrDropItem(item) &&
        !hasManualMapLinkChoice(item) &&
        !itemMapLink(item);
    }

    function addRegionalMapGenieSearchLinks() {
      items.forEach(item => {
        if (!shouldReceiveRegionalMapLink(item)) return;
        item.links = syncMapLink(item.links || [], mapGenieSearchUrl(item));
      });
    }

    function normalizeFandomLinks(item) {
      if (!Array.isArray(item.links)) item.links = [];
      normalizeMapLinks(item);
      const hasDirectRussianPage = item.links.some(link => isRussianFandomUrl(link.url) && !isFandomSearchUrl(link.url));

      if (hasDirectRussianPage) {
        item.links = item.links.filter(link => !isFandomSearchUrl(link.url));
        return;
      }

      item.links = item.links.map(link => {
        if (!isFandomSearchUrl(link.url)) return link;
        return {
          ...link,
          label: link.label || "Fandom",
          url: `https://eldenring.fandom.com/ru/wiki/${wikiSlug(item.name)}`
        };
      });
    }

          canonicalItem.links = [{ label: "Fandom", url: `https://eldenring.fandom.com/ru/wiki/${wikiSlug(canonical)}` }];

        canonicalItem.aliases = [...new Set([...(canonicalItem.aliases || []), ...uniqueAliases])];

        for (let index = items.length - 1; index >= 0; index -= 1) {
          const item = items[index];
          if (item === canonicalItem || item.category !== category || !uniqueAliases.includes(item.name)) continue;

    function normalizeSourceLabel(source = "") {
      const direct = sourceAliases.get(source);
      if (direct) return direct;
      const text = String(source).toLowerCase();
      if (!text) return "Лут";
      if (text.includes("старт")) return "Старт";
      if (text.includes("вторжение")) return "Вторжение";
      if (text.startsWith("лут")) return "Лут";
      if (text.includes("покуп")) return "Покупка";
      if (text.includes("сундук")) return "Сундук";
      if (text.includes("скарабей")) return "Скарабей";
      if (text.includes("фарм") || text.includes("дроп")) return "Фарм";
      if (text.includes("обмен") || text.includes("преобразование")) return "Обмен";
      if (text.includes("босс") || text.includes("рыцарь")) return "Босс";
      if (text.includes("квест") || text.includes("сюжет") || text.includes("награда") || text.includes("подарок")) return "Квест";
      if (text.includes("npc")) return "NPC";
      if (text.includes("алтарь") || text.includes("карта")) return "Лут";
      return source;
    }

        if (!correction) return;

        Object.assign(item, fields);
        if (links) {

    function applyDlcSubregionCorrections() {
      const routes = trackerMeta.dlcSubregionRoutes || [];

      items.forEach(item => {
        const parent = parentRegion(item.region);
        const text = `${item.location || ""} ${item.note || ""}`;
        const route = routes.find(route =>
          route.parent === parent &&
          route.patterns.some(pattern => text.toLocaleLowerCase("ru").includes(pattern.toLocaleLowerCase("ru")))
        );
        if (route) item.region = route.region;
      });
    }

    function upsertFandomLocationCompletionItems() {
      const externalRows = (trackerMeta.locationCompletionItems || []).map(([category, name, region, location, source, note, wikiTitle, warning, mapUrl]) => ({
        category,
        name,
        region,
        location,
        source,
        note,
        wikiTitle,
        warning,
        mapUrl
      }));
      upsertLocationCompletionRows(externalRows);
    }

    function upsertLocationCompletionRows(rows) {
      rows.forEach(row => {
        const existing = items.find(item => item.category === row.category && item.name === row.name);
        const item = existing || {
          id: `fandom-location-${catalogId(row.category, row.name)}`,
          name: row.name,
          aliases: [],
          category: row.category
        };
        const wikiTitle = row.wikiTitle || row.name;
        const { wikiTitle: _wikiTitle, ...fields } = row;
        Object.assign(item, fields);
        if (row.warning === undefined) item.warning = "DLC Shadow of the Erdtree.";
        const link = { label: "Fandom", url: `https://eldenring.fandom.com/ru/wiki/${wikiSlug(wikiTitle)}` };
        const urls = new Set((item.links || []).map(existingLink => existingLink.url));
        item.links = urls.has(link.url) ? (item.links || []) : [...(item.links || []), link];
        if (row.mapUrl) item.links = syncMapLink(item.links || [], row.mapUrl);
        if (!existing) items.push(item);
      });
    }

        }
      };

      const writeJson = (key, value) => {
        try {
          localStorage.setItem(key, JSON.stringify(value));
        } catch {
          // Manual edits remain in memory even if browser storage is unavailable.
        }
      };

      const customRegions = readJson("elden-ring-custom-regions", []);
      if (Array.isArray(customRegions)) {
        writeJson("elden-ring-custom-regions", customRegions.filter(region => !staleRegions.has(region?.name)));
      }

      const regionEdits = readJson("elden-ring-region-edits", {});
      if (regionEdits && typeof regionEdits === "object" && !Array.isArray(regionEdits)) {
        Object.keys(regionEdits).forEach(key => {
          if (staleRegions.has(key) || staleRegions.has(regionEdits[key]?.name)) delete regionEdits[key];
        });
        writeJson("elden-ring-region-edits", regionEdits);
      }

      const deletedRegions = readJson("elden-ring-deleted-regions", []);
      if (Array.isArray(deletedRegions)) {
        writeJson("elden-ring-deleted-regions", deletedRegions.filter(region => !staleRegions.has(region)));
      }

      const customItems = readJson("elden-ring-route-custom-items", []);
      if (Array.isArray(customItems)) {
        customItems.forEach(item => {
          if (item && typeof item === "object") item.region = redirectRegion(item.region);
        });
        writeJson("elden-ring-route-custom-items", customItems);
      }

      const edits = readJson("elden-ring-route-edits", {});
      if (edits && typeof edits === "object" && !Array.isArray(edits)) {
        Object.values(edits).forEach(edit => {
          if (edit && typeof edit === "object") edit.region = redirectRegion(edit.region);
        });
        writeJson("elden-ring-route-edits", edits);
      }
    }

    function updateSoundButton() {
      if (!els.soundToggle) return;
      els.soundToggle.textContent = soundEnabled ? "🔊" : "🔇";
      els.soundToggle.setAttribute("aria-pressed", String(soundEnabled));
      const label = soundEnabled ? "Выключить звук" : "Включить звук";

      els.soundToggle.title = label;

    function playTone(freq, duration, type = "sine", volume = 0.1) {
      if (!soundEnabled) return;
      const AudioContextClass = window.AudioContext || window.webkitAudioContext;
      if (!AudioContextClass) return;
      try {
        audioCtx ||= new AudioContextClass();
        if (audioCtx.state === "suspended") audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(volume, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
      } catch {
        // Sound is optional and must never interrupt tracker interactions.
      }
    }

    function toggleSound() {
      soundEnabled = !soundEnabled;
      try {
        localStorage.setItem("elden_ring_sound_enabled", String(soundEnabled));

      updateSoundButton();
      if (soundEnabled) playTone(500, 0.04, "triangle", 0.03);

    const mobileViewIds = new Set(["regions", "items", "detail"]);

      };

    function ensureMobileHistoryRoot() {
      if (!isMobileLayout() || mobileHistoryReady) return;
      try {
        history.replaceState(mobileHistoryState(currentMobileView()), "");
        mobileHistoryReady = true;
      } catch {
        mobileHistoryReady = false;
      }
    }

    function updateMobileHistory(view, action = "replace") {
      if (!isMobileLayout() || restoringMobileHistory) return;
      ensureMobileHistoryRoot();
      try {
        const payload = mobileHistoryState(view);
        if (action === "push") {
          history.pushState(payload, "");
        } else {
          history.replaceState(payload, "");
        }
      } catch {
        // Browser history is optional; mobile screens still work without it.
      }
    }

    function setMobileView(view, options = {}) {
      const nextView = normalizeMobileView(view);
      els.app.dataset.mobileView = nextView;
      if (options.pushHistory) updateMobileHistory(nextView, "push");
      if (options.replaceHistory) updateMobileHistory(nextView, "replace");
    }

    function goBackMobileView(targetView) {
      if (!isMobileLayout()) {
        setMobileView(targetView);

      closeThemeMenu();
      if (history.state?.eldenRingTrackerMobile) {

      } else {

    function escapeHtml(value = "") {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function applySavedEdits() {
      items.forEach(item => {
        if (state.edits[item.id]) Object.assign(item, state.edits[item.id]);
      });
    }

    function unique(values) {
      return [...new Set(values)].sort((a, b) => a.localeCompare(b, "ru"));
    }

    function visibleRegions(selectedRegion = "") {
      return unique([
        ...editableRegions().map(region => region.name),
        ...items.map(item => parentRegion(item.region)),
        selectedRegion
      ].filter(region => region && !hiddenRegions.has(region) && !state.deletedRegions.has(region)));
    }

    function optionList(values, selectedValue = "") {
      const options = unique([...values, selectedValue].filter(Boolean));
      return options.map(value => `<option value="${escapeHtml(value)}" ${value === selectedValue ? "selected" : ""}>${escapeHtml(value)}</option>`).join("");
    }

    function categoryOptions(selectedCategory = "") {
      return optionList([...preferredCategories, ...items.map(item => item.category)], selectedCategory);
    }

    function sourceOptions(selectedSource = "") {
      return optionList([...preferredSources, ...items.map(item => item.source)], selectedSource);
    }

    function defaultItemRegion() {
      if (state.region !== "Все локации" && !hiddenRegions.has(state.region) && !state.deletedRegions.has(state.region)) return state.region;
      return visibleRegions()[0] || "Собственные заметки";

    function saveDeletedItems() {
      localStorage.setItem("elden-ring-route-deleted-items", JSON.stringify([...state.deletedItems]));
    }

    function saveCustomItems() {
      state.customItems = items.filter(item => item.id.startsWith("custom-"));
      localStorage.setItem("elden-ring-route-custom-items", JSON.stringify(state.customItems));
    }

    function savePlayerNotes() {
      localStorage.setItem("elden-ring-player-notes", JSON.stringify(state.playerNotes));
    }

    function saveCustomRegions() {
      localStorage.setItem("elden-ring-custom-regions", JSON.stringify(state.customRegions));
    }

    function saveRegionEdits() {
      localStorage.setItem("elden-ring-region-edits", JSON.stringify(state.regionEdits));
    }

    function saveDeletedRegions() {
      localStorage.setItem("elden-ring-deleted-regions", JSON.stringify([...state.deletedRegions]));
    }

    function applyDeletedItems() {
      for (let index = items.length - 1; index >= 0; index -= 1) {
        if (state.deletedItems.has(items[index].id)) items.splice(index, 1);
      }
      state.deletedItems.forEach(id => {
        state.done.delete(id);
        delete state.edits[id];
        delete state.playerNotes[id];
      });
    }

    function editableRegions() {
      return [...expectedRegions, ...state.customRegions];
    }

    function regionNote(region) {
      const entry = editableRegions().find(item => item.name === region);
      return descriptions[region] || entry?.note || "";
    }

    function regionEditKey(region) {
      const saved = Object.entries(state.regionEdits).find(([, edit]) => edit?.name === region);
      return saved ? saved[0] : region;
    }

    function applyRegionRename(oldName, newName, note = "") {
      const finalName = newName.trim() || oldName;
      expectedRegions.forEach(region => {
        if (region.name === oldName) {
          region.name = finalName;
          region.note = note || region.note;
        }
      });
      state.customRegions.forEach(region => {
        if (region.name === oldName) {
          region.name = finalName;
          region.note = note || region.note;
        }
      });
      items.forEach(item => {
        if (item.region === oldName) item.region = finalName;
      });
      Object.keys(parentRegions).forEach(region => {
        if (parentRegions[region] === oldName) parentRegions[region] = finalName;
      });
      descriptions[finalName] = note || descriptions[oldName] || "";
      if (finalName !== oldName) delete descriptions[oldName];
      return finalName;
    }

    function applySavedRegionEdits() {
      Object.entries(state.regionEdits).forEach(([originalName, edit]) => {
        if (!edit || typeof edit !== "object") return;
        applyRegionRename(originalName, edit.name || originalName, edit.note || "");
      });
    }

    function createRegion(form) {
      const name = form.regionName.value.trim();
      if (!name) return;
      const note = form.regionNote?.value?.trim() || "Пользовательский раздел.";
      if (!state.customRegions.some(region => region.name === name) && !expectedRegions.some(region => region.name === name)) {
        state.customRegions.push({ name, source: "Пользовательский", note });
      }
      descriptions[name] = note;
      saveCustomRegions();
      state.region = name;
      state.addingRegion = false;
      state.editingRegion = false;
    }

    function saveRegionEdit(oldName, form) {
      const key = regionEditKey(oldName);
      const newName = form.regionName.value.trim() || oldName;
      const note = form.regionNote?.value?.trim() || regionNote(oldName);
      const finalName = applyRegionRename(oldName, newName, note);
      state.regionEdits[key] = { name: finalName, note: descriptions[finalName] || note };
      saveCustomRegions();
      saveRegionEdits();
      state.region = finalName;
      state.addingRegion = false;
      state.editingRegion = false;
    }

    function isCustomRegion(regionName) {
      return state.customRegions.some(region => region.name === regionName);
    }

    function hasRegionEdit(regionName) {
      const key = regionEditKey(regionName);
      return Boolean(state.regionEdits[key]);
    }

    function resetRegionEdit(regionName) {
      const key = regionEditKey(regionName);
      if (!state.regionEdits[key]) return;
      delete state.regionEdits[key];
      saveRegionEdits();
      window.location.reload();
    }

    function deleteCustomRegion(regionName) {
      if (!isCustomRegion(regionName)) return;
      const fallbackRegion = "Собственные заметки";
      state.customRegions = state.customRegions.filter(region => region.name !== regionName);
      Object.keys(state.regionEdits).forEach(key => {
        if (key === regionName || state.regionEdits[key]?.name === regionName) delete state.regionEdits[key];
      });
      items.forEach(item => {
        if (item.region !== regionName) return;
        item.region = fallbackRegion;
        if (!item.id.startsWith("custom-")) {
          state.edits[item.id] = {
            name: item.name,
            category: item.category,
            region: item.region,
            location: item.location,
            source: item.source,
            note: item.note,
            warning: item.warning,
            links: item.links
          };
        }
      });
      delete descriptions[regionName];
      saveCustomItems();
      saveCustomRegions();
      saveRegionEdits();
      saveEdits();
      state.region = "Все локации";
      state.addingRegion = false;
      state.editingRegion = false;
    }

    function deleteRegion(regionName) {
      if (!regionName || regionName === "Все локации") return;
      if (isCustomRegion(regionName)) {
        deleteCustomRegion(regionName);
        return;
      }
      state.deletedRegions.add(regionName);
      saveDeletedRegions();
      state.region = "Все локации";
      state.addingRegion = false;
      state.editingRegion = false;
    }

    function saveItemEdit(id, form) {
      const item = items.find(entry => entry.id === id);
      if (!item) return;
      const links = syncMapLink(parseLinks(form.links.value, regularLinks(item.links)), form.mapUrl.value);

      const edit = {
        name: form.name.value.trim() || item.name,
        category: form.category.value.trim() || item.category,
        region: form.region.value.trim() || item.region,
        location: form.location.value.trim() || item.location,
        source: form.source.value.trim() || item.source,
        note: form.note.value.trim(),
        warning: form.warning.value.trim(),
        links
      };

      Object.assign(item, edit);
      normalizeFandomLinks(item);
      if (id.startsWith("custom-")) {
        saveCustomItems();
      } else {
        state.edits[id] = { ...edit, links: item.links };
        saveEdits();
      }
      state.editing = false;
    }

    function createItem(form) {
      const item = {
        id: `custom-${Date.now()}`,
        name: form.name.value.trim() || "Новый предмет",
        category: form.category.value.trim() || "Другое",
        region: form.region.value.trim() || "Собственные заметки",
        location: form.location.value.trim() || "Не указано",
        source: form.source.value.trim() || "Заметка",
        note: form.note.value.trim() || "Описание еще не добавлено.",
        warning: form.warning.value.trim(),
        links: syncMapLink(parseLinks(form.links.value, []), form.mapUrl.value)
      };

      normalizeFandomLinks(item);
      items.push(item);
      saveCustomItems();
      state.selectedId = item.id;
      state.adding = false;
      state.editing = false;
      state.region = parentRegion(item.region);
      state.category = "Все категории";
      state.source = "Все типы";
      state.status = "all";
    }

    function formatLinks(links = []) {
      return links.map(link => `${link.label} | ${link.url}`).join("\n");
    }

    function parseLinks(value, fallback = []) {
      const links = value
        .split("\n")
        .map(line => line.trim())
        .filter(Boolean)
        .map(line => {
          const [label, ...urlParts] = line.split("|").map(part => part.trim());
          return { label: label || "Ссылка", url: urlParts.join("|") };
        })
        .filter(link => link.url);

      return links.length ? links : fallback;
    }

    function titleFromWikiUrl(url) {
      try {
        const parsed = new URL(url);
        const last = parsed.pathname.split("/").filter(Boolean).pop() || "";
        return decodeURIComponent(last).replaceAll("+", " ").replaceAll("_", " ").trim();
      } catch {
        return "";
      }
    }

    function fillFromWiki(form) {
      const wikiUrl = form.wikiUrl.value.trim();
      const wikiText = form.wikiText.value.trim();
      const title = titleFromWikiUrl(wikiUrl);
      if (title && !form.name.value.trim()) form.name.value = title;
      if (wikiUrl && !form.links.value.trim()) form.links.value = `Fandom | ${wikiUrl}`;
      if (wikiText && !form.note.value.trim()) {
        form.note.value = wikiText
          .split(/\n+/)
          .map(line => line.trim())
          .filter(Boolean)
          .slice(0, 4)
          .join("\n");
      }
    }

    function resetItemEdit(id) {

      saveEdits();
      window.location.reload();

    function deleteItem(id) {
      const item = items.find(entry => entry.id === id);
      if (!item) return;
      if (id.startsWith("custom-")) {
        state.customItems = state.customItems.filter(entry => entry.id !== id);
      } else {
        state.deletedItems.add(id);
        delete state.edits[id];
      }
      state.done.delete(id);
      delete state.playerNotes[id];
      const index = items.findIndex(entry => entry.id === id);
      if (index >= 0) items.splice(index, 1);
      saveDeletedItems();
      saveDone();
      saveEdits();
      savePlayerNotes();
      localStorage.setItem("elden-ring-route-custom-items", JSON.stringify(state.customItems));
      state.editing = false;
      state.selectedId = firstVisibleItem()?.id || items[0]?.id || "";

    function importBackup(file) {
      if (!file) return;
      if (!confirm("Загрузить резервную копию? Текущий прогресс, заметки и ручные правки будут заменены данными из файла.")) return;
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const payload = JSON.parse(reader.result);
          state.done = new Set((Array.isArray(payload.done) ? payload.done : []).map(id => mergedItemIds[id] || id));
          state.edits = payload.edits && typeof payload.edits === "object" ? payload.edits : {};
          state.deletedItems = new Set((Array.isArray(payload.deletedItems) ? payload.deletedItems : []).map(id => mergedItemIds[id] || id));
          state.playerNotes = payload.playerNotes && typeof payload.playerNotes === "object" ? payload.playerNotes : {};
          state.customRegions = Array.isArray(payload.customRegions) ? payload.customRegions : [];
          state.regionEdits = payload.regionEdits && typeof payload.regionEdits === "object" ? payload.regionEdits : {};
          state.deletedRegions = new Set(Array.isArray(payload.deletedRegions) ? payload.deletedRegions : []);
          state.customItems = Array.isArray(payload.customItems) ? payload.customItems : [];
          saveDone();
          saveEdits();
          saveDeletedItems();
          savePlayerNotes();
          saveCustomRegions();
          saveRegionEdits();
          saveDeletedRegions();
          localStorage.setItem("elden-ring-route-custom-items", JSON.stringify(state.customItems));
          window.location.reload();
        } catch {
          alert("Не удалось загрузить резервную копию. Проверь, что это файл из этого приложения.");
        }
      };
      reader.readAsText(file);
    }

    function mergeById(existingItems = [], incomingItems = []) {
      const byId = new Map(existingItems.map(item => [item.id, item]));
      incomingItems.forEach(item => {
        if (!item?.id) return;
        byId.set(item.id, item);
      });
      return [...byId.values()];
    }

    function importUserData(file) {
      if (!file) return;
      if (!confirm("Загрузить только ручные правки? Прогресс собранных предметов останется как сейчас, а заметки и пользовательские изменения будут объединены с файлом.")) return;
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const payload = JSON.parse(reader.result);
          state.edits = { ...state.edits, ...(payload.edits && typeof payload.edits === "object" ? payload.edits : {}) };
          if (Array.isArray(payload.deletedItems)) {
            payload.deletedItems.forEach(id => state.deletedItems.add(mergedItemIds[id] || id));
          }
          state.playerNotes = { ...state.playerNotes, ...(payload.playerNotes && typeof payload.playerNotes === "object" ? payload.playerNotes : {}) };
          state.regionEdits = { ...state.regionEdits, ...(payload.regionEdits && typeof payload.regionEdits === "object" ? payload.regionEdits : {}) };
          if (Array.isArray(payload.deletedRegions)) {
            payload.deletedRegions.forEach(region => state.deletedRegions.add(region));
          }
          state.customRegions = unique([...(state.customRegions || []), ...(Array.isArray(payload.customRegions) ? payload.customRegions : [])]);
          state.customItems = mergeById(state.customItems, Array.isArray(payload.customItems) ? payload.customItems : []);
          saveEdits();
          saveDeletedItems();
          savePlayerNotes();
          saveCustomRegions();
          saveRegionEdits();
          saveDeletedRegions();
          localStorage.setItem("elden-ring-route-custom-items", JSON.stringify(state.customItems));
          window.location.reload();
        } catch {
          alert("Не удалось загрузить ручные правки. Проверь, что это JSON-файл из Elden Ring Tracker.");
        }
      };
      reader.readAsText(file);
    }

    function regionItems(region) {
      const list = region === "Все локации" ? items : items.filter(item => parentRegion(item.region) === region);
      return list.filter(item => !state.deletedRegions.has(parentRegion(item.region)));
    }

    function allRegions() {
      return ["Все локации", ...visibleRegions()];
    }

    function regionCoverage(region) {
      const list = regionItems(region);
      const expected = editableRegions().find(entry => entry.name === region);
      if (region === "Все локации") {
        const regions = editableRegions();
        const covered = regions.filter(entry => regionItems(entry.name).length > 0).length;
        return {
          status: "Общая база",
          note: `${covered} из ${regions.length} регионов уже имеют записи.`
        };
      }
      if (list.length > 0) {
        return {
          status: expected?.source === "Fandom needed" ? "Есть записи, но нужна проверка Fandom" : "Есть записи из Notion",
          note: expected?.note || "Регион есть в базе предметов."
        };
      }
      return {
        status: "Нужно пополнить",
        note: expected?.note || "В базе пока нет предметов для этой локации."
      };
    }

    function completion(list) {
      const done = list.filter(item => state.done.has(item.id)).length;
      return {
        done,
        total: list.length,
        percent: list.length ? Math.round(done / list.length * 100) : 0
      };
    }

    const dlcRegionNames = new Set([
      "Равнина надгробий",
      "Окрестности башни",
      "Теневой Альтус",
      "Вид на Древо Упадка",
      "Лазурное побережье",
      "Зубатая гора",
      "Прибежище Рауха",
      "Руины древней обители Рауха",
      "Лес бездны"
    ]);

    function isDlcRegion(region) {
      return dlcRegionNames.has(region);
    }

    function sectionItems(regions) {
      const regionSet = new Set(regions);
      return items.filter(item =>
        regionSet.has(parentRegion(item.region)) &&
        !state.deletedRegions.has(parentRegion(item.region))
      );
    }

    function saveCollapsedRegionSections() {
      localStorage.setItem("elden-ring-collapsed-region-sections", JSON.stringify(state.collapsedRegionSections));
    }

    function toggleRegionSection(sectionId) {
      state.collapsedRegionSections[sectionId] = !state.collapsedRegionSections[sectionId];
      saveCollapsedRegionSections();
    }

    function exportedDatabaseVersion() {
      const now = new Date();
      const date = [
        now.getFullYear(),
        String(now.getMonth() + 1).padStart(2, "0"),
        String(now.getDate()).padStart(2, "0")
      ].join(".");
      const time = [
        String(now.getHours()).padStart(2, "0"),
        String(now.getMinutes()).padStart(2, "0"),
        String(now.getSeconds()).padStart(2, "0")
      ].join("");
      return `${date}-${time}`;
    }

    function exportedTrackerMeta(exportedItems) {
      const deletedRegions = state.deletedRegions;
      const exportedRegions = [...expectedRegions, ...state.customRegions]
        .filter(region => region?.name && !deletedRegions.has(region.name))
        .filter((region, index, list) => list.findIndex(entry => entry.name === region.name) === index)
        .map(region => ({ ...region }));
      const exportedDescriptions = Object.fromEntries(
        Object.entries(descriptions).filter(([region]) => !deletedRegions.has(region))
      );
      const exportedParentRegions = Object.fromEntries(
        Object.entries(parentRegions).filter(([region, parent]) =>
          !deletedRegions.has(region) && !deletedRegions.has(parent)
        )
      );
      const version = exportedDatabaseVersion();
      const updatedAt = new Date().toISOString().slice(0, 10);
      const dlcItemCount = exportedItems.filter(item => isDlcRegion(parentRegion(item.region))).length;

      return {
        ...trackerMeta,
        databaseVersion: version,
        updatedAt,
        itemCount: exportedItems.length,
        dlcItemCount,
        changeLog: [
          `Экспортированы ручные правки из режима редактирования (${updatedAt}).`,
          ...(trackerMeta.changeLog || [])
        ],
        regionDescriptions: exportedDescriptions,
        expectedRegions: exportedRegions,
        parentRegions: exportedParentRegions
      };
    }

    function buildTrackerDataSource() {
      const exportedItems = items.map(item => JSON.parse(JSON.stringify(item)));
      const exportedMeta = exportedTrackerMeta(exportedItems);
      return [
        `window.ELDEN_RING_TRACKER_META = ${JSON.stringify(exportedMeta, null, 2)};`,
        "",
        `window.ELDEN_RING_TRACKER_ITEMS = ${JSON.stringify(exportedItems, null, 2)};`,
        ""
      ].join("\n");
    }

    function exportTrackerDataFile() {
      const source = buildTrackerDataSource();
      const blob = new Blob([source], { type: "text/javascript;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = "tracker-data.js";
      document.body.appendChild(link);
      link.click();
      link.remove();
      window.setTimeout(() => URL.revokeObjectURL(url), 1000);
      alert("Файл завантажено! Завантажте його на GitHub щоб зміни з'явились на всіх пристроях (замініть старий tracker-data.js у репозиторії).");
    }

    function clearLocalTrackerEdits() {
      const keys = [
        "elden-ring-route-edits",
        "elden-ring-route-deleted-items",
        "elden-ring-route-custom-items",
        "elden-ring-custom-regions",
        "elden-ring-region-edits",
        "elden-ring-deleted-regions"
      ];
      if (!confirm("Очистити всі локальні правки предметів і локацій? Прогрес зібраних предметів та нотатки гравця залишаться.")) return;
      keys.forEach(key => localStorage.removeItem(key));
      alert("Локальні правки очищено. Трекер буде перезавантажено.");
      window.location.reload();
    }

    function filteredItems() {
      const query = state.search.trim().toLowerCase();
      return items.filter(item => {
        const haystack = [item.name, ...(item.aliases || []), item.category, item.region, item.location, item.source, item.note].join(" ").toLowerCase();
        if (state.deletedRegions.has(parentRegion(item.region))) return false;
        const matchesSearch = !query || haystack.includes(query);
        const matchesRegion = state.region === "Все локации" || parentRegion(item.region) === state.region;
        const matchesCategory = state.category === "Все категории" || item.category === state.category;
        const matchesSource = state.source === "Все типы" || item.source === state.source;
        const isDone = state.done.has(item.id);
        const matchesStatus = state.status === "all" || (state.status === "done" ? isDone : !isDone);
        return matchesSearch && matchesRegion && matchesCategory && matchesSource && matchesStatus;
      });
    }

    function orderedItems(list) {
      return [...list].sort((a, b) => {
        if (state.order === "openFirst" || state.order === "doneFirst") {
          const aDone = state.done.has(a.id);
          const bDone = state.done.has(b.id);
          if (aDone !== bDone) {
            return state.order === "openFirst"
              ? Number(aDone) - Number(bDone)
              : Number(bDone) - Number(aDone);
          }
        }
        return a.name.localeCompare(b.name, "ru");
      });
    }

    function firstVisibleItem() {
      return orderedItems(filteredItems())[0];
    }

    function resetFilters() {
      state.search = "";
      state.category = "Все категории";
      state.source = "Все типы";
      state.status = "all";
      state.order = "alpha";
      if (els.search) els.search.value = "";
      const first = firstVisibleItem();
      if (first) state.selectedId = first.id;
    }

    function itemQualityText(item) {
      return [item.region, item.location, item.source, item.note, item.warning].join(" ").toLowerCase();
    }

    function hasDirectFandomLink(item) {
      return Boolean(item.links?.some(link => link.url.includes("eldenring.fandom.com/ru/wiki/") && !link.url.includes("Special:Search")));
    }

    function cleanDetailText(value = "") {
      return String(value)
        .replaceAll("DLC Shadow of the Erdtree.", "")
        .replaceAll("DLC Shadow of the Erdtree;", "")
        .replaceAll("DLC Shadow of the Erdtree", "")
        .replaceAll("Shadow of the Erdtree.", "")
        .replaceAll("Shadow of the Erdtree;", "")
        .replaceAll("Shadow of the Erdtree", "")
        .replaceAll("места благодати", "благодати")
        .replaceAll("местом благодати", "благодатью")
        .replaceAll("место благодати", "благодать")
        .replaceAll("Место благодати", "Благодать")
        .replace(/\s+/g, " ")
        .trim();
    }

    function shortDetailText(value = "", fallback = "") {
      const text = cleanDetailText(value || fallback);
      if (!text) return fallback;
      return text.length > 210 ? `${text.slice(0, 207).trim()}...` : text;
    }

    function itemTypeSummary(item) {
      const parts = [item.category, `способ: ${item.source}`];
      if (isDlcItem(item)) parts.push("DLC");
      return parts.join(" · ");
    }

    function itemPlaceSummary(item) {
      const parent = parentRegion(item.region);
      return parent === item.region
        ? `${item.region}: ${item.location}`
        : `${parent} / ${item.region}: ${item.location}`;
    }

    function itemImportantSummary(item) {
      return shortDetailText(item.warning || item.note, "Важных примечаний пока нет.");
    }

    function isDlcItem(item) {
      const text = itemQualityText(item);
      const dlcParents = [
        "равнина надгробий",
        "теневой альтус",
        "вид на древо упадка",
        "прибежище рауха",
        "лазурное побережье",
        "зубатая гора",
        "руины древней обители рауха",
        "лес бездны"
      ];
      if (dlcParents.includes(parentRegion(item.region).toLocaleLowerCase("ru"))) return true;
      return [
        "dlc",
        "shadow of the erdtree",
        "царство теней",
        "теневой альтус",
        "равнина надгробий",
        "замок энсис",
        "белурат",
        "энир-илим",
        "пристанище теней",
        "вид на древо упадка",
        "прибежище рауха",
        "побережье лазури",
        "зубатая гора",
        "руины рауха",
        "лес бездны",
        "разлом в каменном саркофаге"
      ].some(marker => text.includes(marker));
    }

    function hasUnclearRoute(item) {
      const text = itemQualityText(item);
      return (
        hiddenRegions.has(parentRegion(item.region)) ||
        item.source === "Fandom" ||
        text.includes("каталожная запись") ||
        text.includes("требуется уточнить") ||
        text.includes("нужно уточнить") ||
        text.includes("конкретное место") ||
        text.includes("стоит сверить") ||
        text.includes("маршруты")
      );
    }

    function itemIssues(item) {
      const text = itemQualityText(item);
      const issues = [];
      const parent = parentRegion(item.region);
      if (hiddenRegions.has(parent)) issues.push("предмет привязан к служебному разделу");
      if (hasUnclearRoute(item)) issues.push("маршрут нужно уточнить");
      if (isDlcItem(item) && broadRouteMarkers.some(marker => text.includes(marker))) issues.push("DLC-точка слишком общая");
      if (item.location && item.location === parent && !["Крепость круглого стола", "Лес бездны"].includes(parent)) issues.push("указан только регион без конкретной точки");
      if (isDlcItem(item) && !item.links?.some(link => link.url.includes("eldenring.fandom.com/ru/wiki/"))) issues.push("нет прямой ссылки Fandom");
      return [...new Set(issues)];
    }

    function hasItemIssues(item) {
      return itemIssues(item).length > 0;
    }

    function databaseQuality() {
      const unclear = items.filter(hasUnclearRoute);
      const dlc = items.filter(isDlcItem);
      const custom = items.filter(item => item.id.startsWith("custom-"));
      const problem = items.filter(hasItemIssues);
      return {
        total: items.length,
        dlc: dlc.length,
        unclear: unclear.length,
        problem: problem.length,
        custom: custom.length,
        regions: allRegions().length - 1,
        categories: unique(items.map(item => item.category)).length
      };
    }

    function alphabeticalItems(list) {
      return [...list].sort((a, b) => a.name.localeCompare(b.name, "ru"));
    }

    const displayedProgressValues = new Map();
    const progressAnimationFrames = new WeakMap();

    function animateNumber(element, from, to, duration = 500) {
      if (!element) return;
      const previousFrame = progressAnimationFrames.get(element);
      if (previousFrame) cancelAnimationFrame(previousFrame);
      if (from === to) {
        element.textContent = `${to}%`;
        return;
      }
      const start = performance.now();
      function tick(now) {
        const progress = Math.min((now - start) / duration, 1);
        const eased = 1 - Math.pow(1 - progress, 3);
        const current = Math.round(from + (to - from) * eased);
        element.textContent = `${current}%`;
        if (progress < 1) {
          progressAnimationFrames.set(element, requestAnimationFrame(tick));
        } else {
          progressAnimationFrames.delete(element);
        }
      }
      progressAnimationFrames.set(element, requestAnimationFrame(tick));
    }

    function currentProgressValue(key) {
      if (key === "overall") return completion(items).percent;
      if (key.startsWith("region:")) return completion(regionItems(key.slice(7))).percent;
      if (key.startsWith("detail:")) return completion(regionItems(key.slice(7))).percent;
      if (key.startsWith("section:")) {
        const sectionId = key.slice(8);
        const regions = visibleRegions().filter(region => sectionId === "dlc" ? isDlcRegion(region) : !isDlcRegion(region));
        return completion(sectionItems(regions)).percent;
      }
      return 0;
    }

    function animateProgressNumbers(useCurrentData = false) {
      document.querySelectorAll("[data-progress-value]").forEach(element => {
        const key = element.dataset.progressKey || "progress";
        const to = useCurrentData ? currentProgressValue(key) : Number(element.dataset.progressValue) || 0;
        element.dataset.progressValue = to;
        const from = displayedProgressValues.has(key) ? displayedProgressValues.get(key) : 0;
        animateNumber(element, from, to);
        displayedProgressValues.set(key, to);
      });
    }

    function renderControls() {
      const categories = ["Все категории", ...unique(items.map(item => item.category))];
      const sources = ["Все типы", ...unique(items.map(item => item.source))];
      if (els.category) {
        els.category.innerHTML = categories.map(category => `<option ${category === state.category ? "selected" : ""}>${category}</option>`).join("");
      }
      if (els.source) {
        els.source.innerHTML = sources.map(source => `<option ${source === state.source ? "selected" : ""}>${source}</option>`).join("");
      }
    }

    function renderRegions() {
      const regions = allRegions();
      els.regionCount.textContent = `${regions.length - 1}`;
      const renderRegionButton = region => {
        const stats = completion(regionItems(region));
        return `
          <button class="region-btn ${state.region === region ? "active" : ""}" data-region="${escapeHtml(region)}">

            </span>

          </section>
        `;

    function renderHeader(list) {
      const visibleCategories = unique(list.map(item => item.category));
      const coverage = regionCoverage(state.region);
      const categoryLabel = category => {
        const categoryItems = category === "Все категории" ? list : list.filter(item => item.category === category);
        const stats = completion(categoryItems);
        return `${escapeHtml(category)} <span class="tab-count">${stats.done}/${stats.total}</span>`;
      };
      els.regionTitle.textContent = state.region;
      els.tabs.innerHTML = ["Все категории", ...visibleCategories].map(category => `

    function nextOpenItem() {
      const currentStatus = state.status;
      state.status = "all";
      const visible = orderedItems(filteredItems());
      state.status = currentStatus;
      const openItems = visible.filter(item => !state.done.has(item.id));
      if (!openItems.length) return null;
      const selectedIndex = openItems.findIndex(item => item.id === state.selectedId);
      return selectedIndex >= 0 ? openItems[(selectedIndex + 1) % openItems.length] : openItems[0];
    }

    function selectNextOpenItem() {
      const item = nextOpenItem();
      if (!item) return;
      state.selectedId = item.id;
      state.status = "all";
      state.editing = false;
      state.adding = false;
      state.addingFromWiki = false;
      state.addingRegion = false;
      state.editingRegion = false;
